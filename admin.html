<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masti365 | Admin Dashboard</title>
    <link rel="stylesheet" href="./admin.css">
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', Arial, sans-serif; }
        body { background: #0b0b0b; color: #fff; padding: 40px 20px; }
        .dashboard { max-width: 1100px; margin: auto; }
        h1 { color: #FFD700; text-align: center; margin-bottom: 40px; text-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
        .panel { background: #141414; border: 1px solid #222; border-radius: 15px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { color: #FFD700; margin-bottom: 20px; font-size: 22px; display: flex; align-items: center; gap: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #222; }
        th { background: #1a1a1a; color: #FFD700; }
        tr:hover { background: #1c1c1c; }
        .status { padding: 5px 12px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .pending { background: #FF8C00; color: #000; }
        .approved { background: #25D366; color: #000; }
        ul { list-style: none; }
        ul li { padding: 12px; background: #1a1a1a; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #FFD700; }
        .refresh-btn { background: #FFD700; color: #000; padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .refresh-btn:hover { background: #fff; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1><i class="fas fa-user-shield"></i> Masti365 Management Panel</h1>
        
        <button class="refresh-btn" onclick="loadAdminData()"><i class="fas fa-sync-alt"></i> Refresh Data</button>

        <div class="grid">
            <!-- Deposit Requests Panel -->
            <div class="panel">
                <h2><i class="fas fa-wallet"></i> Incoming Deposit Claims</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Amount (Rs)</th>
                            <th>Transaction ID (TrxID)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="depositTableBody">
                        <!-- Live Data dynamic add hoga -->
                    </tbody>
                </table>
            </div>

            <!-- Newsletter Subscribers Panel -->
            <div class="panel">
                <h2><i class="fas fa-envelope"></i> Newsletter Subscribers</h2>
                <ul id="subscriberList">
                    <!-- Live Emails dynamic add honge -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        function loadAdminData() {
            // 1. Fetch Deposits from Server
            fetch('http://localhost:3000/api/admin/deposits')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('depositTableBody');
                    tbody.innerHTML = ''; // Pehle table clear karein
                    
                    if(data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#777;">No deposits logged yet.</td></tr>';
                    }

                    data.forEach(item => {
                        tbody.innerHTML += `
                            <tr>
                                <td>#${item.id}</td>
                                <td style="font-weight:bold; color:#25D366;">Rs. ${item.amount}</td>
                                <td style="color:#ddd; font-family:monospace;">${item.trxid}</td>
                                <td><span class="status pending">${item.status}</span></td>
                            </tr>
                        `;
                    });
                })
                .catch(err => console.error("Error loading deposits:", err));

            // 2. Fetch Subscribers from Server
            fetch('http://localhost:3000/api/admin/subscribers')
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('subscriberList');
                    list.innerHTML = ''; // Pehle list clear karein

                    if(data.length === 0) {
                        list.innerHTML = '<li style="color:#777; border-left-color:#444;">No email subscribers yet.</li>';
                    }

                    data.forEach(sub => {
                        list.innerHTML += `<li><i class="fas fa-user"></i> ${sub.email}</li>`;
                    });
                })
                .catch(err => console.error("Error loading subscribers:", err));
        }

        // Page load hote hi run ho jaye
        window.onload = loadAdminData;
    </script>
</body>
</html>
